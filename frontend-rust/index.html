<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Checkboxes</title>
    <!-- Doom WASM (jacobenget/doom.wasm) -->
    <link data-trunk rel="rust" data-bin="checkbox-frontend" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="doom.wasm" />
    <link data-trunk rel="copy-file" href="doom-jacobenget.js" />
    <link data-trunk rel="copy-file" href="doom-mode.js" />
    <script src="doom-jacobenget.js"></script>
    <script src="doom-mode.js"></script>
</head>
<body>
    <div id="app"></div>
    <!-- Doom container (will be created by doom-mode.js if needed) -->

    <!-- Expose test helpers for E2E tests -->
    <script>
    // Wait for WASM bindings to be available, then expose test_send_batch_update globally
    window.addEventListener('TrunkApplicationStarted', () => {
        console.log('TrunkApplicationStarted event fired');
        console.log('window.wasmBindings available:', !!window.wasmBindings);
        if (window.wasmBindings) {
            console.log('wasmBindings keys:', Object.keys(window.wasmBindings));
            if (window.wasmBindings.test_send_batch_update) {
                window.test_send_batch_update = window.wasmBindings.test_send_batch_update;
                console.log('✅ test_send_batch_update attached to window');
            } else {
                console.log('❌ test_send_batch_update NOT found in wasmBindings');
            }
        }
    });
    </script>
</body>
</html>
