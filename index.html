<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1 Million Checkboxes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      overflow: hidden;
    }
    .header {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: #16213e;
    }
    h1 { font-size: 1.2rem; }
    .status {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .status.connecting { background: #f39c12; color: #000; }
    .status.connected { background: #27ae60; color: #fff; }
    .status.error { background: #e74c3c; color: #fff; }
    .stats {
      margin-left: auto;
      font-size: 0.85rem;
      color: #888;
    }
    canvas {
      display: block;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>1 Million Checkboxes</h1>
    <div id="status" class="status connecting">Connecting...</div>
    <div id="stats" class="stats"></div>
  </div>
  <canvas id="checkbox-canvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
